name: Upstream Sync

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *" # every day
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    steps:
      # Step 1: run a standard checkout action
      - name: Checkout target repo
        uses: actions/checkout@v4

      # Step 2: run the sync action
      - name: Sync upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_sync_repo: tangly1024/NotionNext
          upstream_sync_branch: main
          target_sync_branch: main
          # GITHUB_TOKEN 无法推送 .github/workflows/ 下的文件（GitHub 安全限制），
          # 上游一旦改动 workflow 文件，同步就会被拒绝。需改用带 workflow 权限的 PAT：
          # 在仓库 Settings → Secrets and variables → Actions 新增名为
          # UPSTREAM_SYNC_TOKEN 的 secret（PAT 需勾选 repo + workflow 权限）。
          # 未配置时自动回退到 GITHUB_TOKEN（仅能同步非 workflow 文件）。
          target_repo_token: ${{ secrets.UPSTREAM_SYNC_TOKEN || secrets.GITHUB_TOKEN }}

          # Set test_mode true to run tests instead of the true action!!
          test_mode: false

      - name: Sync check
        if: failure()
        run: |
          echo "[Error] 同步失败。常见原因：上游改动了 .github/workflows/ 下的文件，而 GITHUB_TOKEN 无权推送 workflow 变更。"
          echo "解决办法：配置带 workflow 权限的 PAT 到仓库 secret 'UPSTREAM_SYNC_TOKEN'，并先手动 Sync Fork 一次。"
          exit 1
